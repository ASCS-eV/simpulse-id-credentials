name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- JOB 1: Standards & Syntax ---
  standards-and-syntax:
    name: 🎨 Standards & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # CRITICAL FIX 1: Only fetch the top-level submodule. 
          # Do NOT use 'recursive' here, or it crashes on the SSH URL immediately.
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: python3 -m pip install -e ./ontology-management-base -e ".[dev]"
      
      - name: Install pre-commit hooks
        run: pre-commit install

      - name: Run pre-commit (Lint + Syntax)
        run: pre-commit run --all-files

  # --- JOB 2: Examples Validation ---
  validate-examples:
    name: ⚖️ Validate Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # CRITICAL FIX 1: Stop recursion here so we can fix the URLs first.
          submodules: true

      # CRITICAL FIX 2: Force Git to use HTTPS for GitLab (bypassing SSH keys)
      - name: Configure Git to use HTTPS for GitLab
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://gitlab.com/".insteadOf "ssh://git@gitlab.com/"

      # CRITICAL FIX 3: Now manually fetch the nested submodules safely
      - name: Update nested submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          
      - name: Install dependencies
        run: python3 -m pip install -e ./ontology-management-base -e ".[dev]"

      # Generate the ontology (SimpulseID etc.)
      - name: Generate Ontology from LinkML
        run: python3 src/generate_from_linkml.py

      - name: Run SHACL Validation on Examples
        run: |
          FILES=$(find examples -name "*.json" -o -name "*.jsonld")
          
          if [ -z "$FILES" ]; then
            echo "No example files found to test."
            exit 0
          fi
          
          echo "Testing the following files:"
          echo "$FILES"
          
          python3 ontology-management-base/src/check_jsonld_against_shacl_schema.py $FILES --force-load
