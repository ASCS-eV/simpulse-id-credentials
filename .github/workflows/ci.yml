name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- JOB 1: Standards & Syntax ---
  standards-and-syntax:
    name: 🎨 Standards & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Only fetch the direct parent submodule initially to avoid the SSH crash
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: python3 -m pip install -e ./ontology-management-base -e ".[dev]"
      
      - name: Install pre-commit hooks
        run: pre-commit install

      - name: Run pre-commit (Lint + Syntax)
        run: pre-commit run --all-files

  # --- JOB 2: Examples Validation ---
  validate-examples:
    name: ⚖️ Validate Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 1. Fetch only the top-level submodule (ontology-management-base)
          submodules: true

      # 2. FIX: Force git to use HTTPS for GitLab (bypassing the SSH Key error)
      - name: Configure Git to use HTTPS for GitLab
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://gitlab.com/".insteadOf "ssh://git@gitlab.com/"

      # 3. Now safely fetch the nested submodules (service-characteristics) using HTTPS
      - name: Update nested submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          
      - name: Install dependencies
        run: python3 -m pip install -e ./ontology-management-base -e ".[dev]"

      # 4. Generate the ontology (SimpulseID etc.)
      # This needs to happen BEFORE validation so the schemas exist
      - name: Generate Ontology from LinkML
        run: python3 src/generate_from_linkml.py

      - name: Run SHACL Validation on Examples
        run: |
          FILES=$(find examples -name "*.json" -o -name "*.jsonld")
          
          if [ -z "$FILES" ]; then
            echo "No example files found to test."
            exit 0
          fi
          
          echo "Testing the following files:"
          echo "$FILES"
          
          # The --force-load flag will pick up the ontologies generated in the previous step
          python3 ontology-management-base/src/check_jsonld_against_shacl_schema.py $FILES --force-load
