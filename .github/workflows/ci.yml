name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- JOB 1: Standards & Syntax ---
  standards-and-syntax:
    name: Standards & Syntax
    runs-on: ubuntu-latest
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Lint
        run: make lint

  # --- JOB 2: Generate & Validate ---
  generate-validate:
    name: Generate & Validate
    runs-on: ubuntu-latest
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Generate artifacts
        run: make generate

      - name: Validate examples
        run: make validate

  # --- JOB 3: Test Suite (Python) ---
  test-python:
    name: Test Suite (Python)
    runs-on: ubuntu-latest
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: make install-dev

      - name: Run tests
        run: make test

  # --- JOB 4: Test Suite (TypeScript) ---
  test-ts:
    name: Test Suite (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: submodules/harbour-credentials/src/typescript/harbour
        run: yarn install --immutable

      - name: Run TypeScript tests
        working-directory: submodules/harbour-credentials/src/typescript/harbour
        run: yarn test
