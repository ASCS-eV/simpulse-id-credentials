name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- JOB 1: Standards & Syntax ---
  standards-and-syntax:
    name: 🎨 Standards & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # DO NOT use 'submodules: true' here. 
        # We must handle them manually to fix the SSH/HTTPS issues first.

      # STEP 1: Fix Git URLs for BOTH GitHub and GitLab
      - name: Configure Git to use HTTPS (Bypass SSH)
        run: |
          # Fix GitHub URLs
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          
          # Fix GitLab URLs
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://gitlab.com/".insteadOf "ssh://git@gitlab.com/"

      # STEP 2: Manually fetch submodules now that URLs are fixed
      - name: Initialize Submodules
        run: git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: python3 -m pip install -e ./ontology-management-base -e ".[dev]"
      
      - name: Install pre-commit hooks
        run: pre-commit install

      - name: Run pre-commit (Lint + Syntax)
        run: pre-commit run --all-files

  # --- JOB 2: Examples Validation ---
  validate-examples:
    name: ⚖️ Validate Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # DO NOT use 'submodules: true' here.

      # STEP 1: Fix Git URLs for BOTH GitHub and GitLab
      - name: Configure Git to use HTTPS (Bypass SSH)
        run: |
          # Fix GitHub URLs
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          
          # Fix GitLab URLs
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://gitlab.com/".insteadOf "ssh://git@gitlab.com/"

      # STEP 2: Manually fetch submodules
      - name: Initialize Submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          
      - name: Install dependencies
        run: python3 -m pip install -e ./ontology-management-base -e ".[dev]"

      # STEP 3: Generate the ontology (required for validation)
      - name: Generate Ontology from LinkML
        run: python3 src/generate_from_linkml.py

      - name: Run SHACL Validation on Examples
        run: |
          FILES=$(find examples -name "*.json" -o -name "*.jsonld")
          
          if [ -z "$FILES" ]; then
            echo "No example files found to test."
            exit 0
          fi
          
          echo "Testing the following files:"
          echo "$FILES"
          
          python3 ontology-management-base/src/check_jsonld_against_shacl_schema.py $FILES --force-load
