name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- JOB 1: Standards & Syntax ---
  standards-and-syntax:
    name: Standards & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: python3 -m pip install -e ./submodules/ontology-management-base -e ".[dev]"

      - name: Run pre-commit (Lint + Syntax)
        run: pre-commit run --all-files

  # --- JOB 2: Test Suite (Python) ---
  test-python:
    name: Test Suite (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python3 -m pip install -e "./submodules/harbour-credentials[dev]" -e ./submodules/ontology-management-base -e ".[dev]"

      - name: Install JS dependencies (for interop tests)
        working-directory: submodules/harbour-credentials/src/typescript/harbour
        run: npm ci

      - name: Run harbour-credentials JOSE tests
        run: |
          cd submodules/harbour-credentials
          PYTHONPATH=src/python:$PYTHONPATH pytest tests/ -v --tb=short

      - name: Run all main repo tests
        run: |
          PYTHONPATH=submodules/harbour-credentials/src/python:$PYTHONPATH pytest tests/ -v --tb=short

  # --- JOB 3: Test Suite (TypeScript) ---
  test-ts:
    name: Test Suite (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: submodules/harbour-credentials/src/typescript/harbour
        run: npm ci

      - name: Run TypeScript tests
        working-directory: submodules/harbour-credentials/src/typescript/harbour
        run: npx vitest run

  # --- JOB 4: Examples Validation ---
  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: python3 -m pip install -e ./submodules/ontology-management-base -e ".[dev]"

      - name: Generate artifacts from LinkML
        run: python3 src/generate_from_linkml.py

      - name: SHACL-validate example credentials
        run: |
          FILES=$(find examples -name "*.json" -o -name "*.jsonld" | sort)
          if [ -z "$FILES" ]; then
            echo "No example files found."
            exit 0
          fi
          echo "Validating: $FILES"
          onto-validate --run check-data-conformance --path $FILES --no-catalog
