---
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: jsonld-lint
        name: JSON-LD Parser
        entry: python -m src.tools.validators.syntax_validator --json
        language: system
        types: [json]
        files: \.json$

      - id: turtle-lint
        name: Turtle Parser
        entry: python -m src.tools.validators.syntax_validator --turtle
        language: system
        types: [text]
        files: \.(ttl)$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint-cli2.yaml"]
