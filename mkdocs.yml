site_name: Credentials Documentation
site_description: Verifiable credential schemas and artifacts for the ENVITED-X ecosystem
site_url: https://ascs-ev.github.io/credentials/
repo_url: https://github.com/ASCS-eV/credentials
repo_name: ASCS-eV/credentials

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Credential Types:
      - Overview: credentials/index.md
      - Participant: credentials/participant.md
      - User: credentials/user.md
      - Administrator: credentials/administrator.md
      - Membership: credentials/membership.md
  - Examples:
      - Gallery: examples/index.md
  - Integration:
      - Harbour Credentials: integration/harbour.md
      - Validation: integration/validation.md
  - Reference:
      - LinkML Schemas: reference/linkml.md
      - Credential Data Model: reference/credential-model.md
      - JSON-LD Contexts: reference/jsonld.md
