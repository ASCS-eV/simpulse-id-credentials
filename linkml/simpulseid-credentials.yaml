id: https://w3id.org/ascs-ev/simpulse-id/credentials/v1/credentials
name: simpulseid-credentials
description: >
  Credential type definitions for SimpulseID. These extend HarbourCredential
  and are validated by harbour's SHACL shapes (via RDFS inference). Separated
  from subject types so that SHACL generation with exclude_imports=True
  produces shapes only for subject types.

  NOTE: All five credential types share the same structure (is_a: HarbourCredential,
  optional credentialStatus + evidence). This repetition is intentional — each
  type needs its own class_uri so that SHACL target classes and JSON-LD type
  arrays correctly distinguish credential kinds. LinkML does not support
  generating multiple class_uris from a single template.

prefixes:
  linkml: https://w3id.org/linkml/
  simpulseid: https://w3id.org/ascs-ev/simpulse-id/credentials/v1/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  cred: https://www.w3.org/2018/credentials#

default_prefix: simpulseid

imports:
  - linkml:types
  - ./harbour

classes:
  ParticipantCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a simpulseid:Participant (organization) identity.
    class_uri: simpulseid:ParticipantCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  AdministratorCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a simpulseid:Administrator (person with elevated permissions).
    class_uri: simpulseid:AdministratorCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  UserCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a simpulseid:User (natural person).
    class_uri: simpulseid:UserCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  AscsBaseMembershipCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to ASCS e.V. base membership.
    class_uri: simpulseid:AscsBaseMembershipCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  AscsEnvitedMembershipCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to ASCS e.V. ENVITED membership.
    class_uri: simpulseid:AscsEnvitedMembershipCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }
