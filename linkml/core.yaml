id: https://schema.reachhaven.com/Core/linkml/v1#Core
name: core
description: >
  Shared LinkML core definitions. Native LinkML properties (identifier: true 
  and designates_type: true) ensure these slots are correctly mapped to 
  @id and @type in JSON-LD contexts.

prefixes:
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#

default_prefix: linkml
default_range: string

imports:
  - linkml:types

slots:
  id:
    description: The stable identifier for the entity (becomes @id in JSON-LD).
    identifier: true  # Native Subject ID mapping
    required: true
    range: uri

  type:
    description: The semantic type of the entity (becomes @type in JSON-LD).
    designates_type: true # Native RDF type mapping
    slot_uri: rdf:type    
    multivalued: true
    range: uri
