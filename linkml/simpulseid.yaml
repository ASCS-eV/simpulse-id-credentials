id: https://w3id.org/ascs-ev/simpulse-id/credentials/v1
name: simpulseid
description: >
  LinkML schema for SimpulseID credentials.
  Domain layer on top of Harbour credentials base. Defines ASCS-specific
  credential types and subject types extending HarbourCredential.
  Gaia-X compliance is delegated to the Harbour baseline credential,
  referenced via harbourCredential IRI.

prefixes:
  linkml: https://w3id.org/linkml/
  simpulseid: https://w3id.org/ascs-ev/simpulse-id/credentials/v1/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  # NOTE: Two schema.org prefixes are required for SHACL compatibility.
  # W3C VC v2 context maps "name" → https://schema.org/name (@protected).
  # Harbour core and most schema.org slots use http://schema.org/ (schema:).
  # Subject type "name" attributes use sdo: (HTTPS) so the generated SHACL
  # sh:path matches the actual RDF predicate produced by the W3C context.
  # See: https://www.w3.org/TR/vc-data-model-2.0/ §5.2 (context processing).
  schema: http://schema.org/
  sdo: https://schema.org/
  cred: https://www.w3.org/2018/credentials#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: simpulseid
default_range: string

# NOTE: The generated JSON-LD context uses @vocab: simpulseid: which
# resolves bare @id values (e.g., "duns", "hash") to simpulseid:duns etc.
# This is correct per JSON-LD 1.1 §4.1.3 when this context is the last
# entry in the @context array, which is the standard usage pattern.

imports:
  - linkml:types
  - ./harbour
  - ./simpulseid-credentials

# ==========================================
# Slots
# ==========================================

slots:
  # --- SimpulseID Specific Business Slots ---

  duns:
    description: The Data Universal Numbering System (DUNS) number.
    slot_uri: simpulseid:duns
    range: string

  baseMembershipCredential:
    description: Reference to the base membership credential required for nested memberships.
    slot_uri: simpulseid:baseMembershipCredential
    range: uri

  member:
    description: The participant (organization or person) that holds this membership.
    slot_uri: schema:member
    range: uri

  # --- Schema.org Mappings (Natural Person & Memberships) ---

  givenName:
    slot_uri: schema:givenName
    range: string

  familyName:
    slot_uri: schema:familyName
    range: string

  memberOf:
    slot_uri: schema:memberOf
    multivalued: true
    range: uri

  programName:
    slot_uri: schema:programName
    range: string

  hostingOrganization:
    description: Reference to the organization hosting the membership program.
    slot_uri: schema:hostingOrganization
    range: uri

  memberSince:
    slot_uri: schema:memberSince
    range: date

  # --- SimpulseID Extensions ---

  legalForm:
    description: The legal form of the entity (e.g., AG, GmbH).
    slot_uri: simpulseid:legalForm
    range: SimpulseIdLegalForm

  # --- Reference Slots ---

  harbourCredential:
    description: >
      IRI reference to the Harbour Gaia-X credential that serves as the
      baseline of trust for this SimpulseID credential.
    slot_uri: simpulseid:harbourCredential
    range: uri
    required: true

  termsAndConditions:
    description: Terms and conditions accepted by the credential subject.
    slot_uri: simpulseid:termsAndConditions
    range: TermsAndConditions
    multivalued: true
    inlined: true
    inlined_as_list: true
    required: false

  hash:
    description: Cryptographic hash of the referenced document.
    slot_uri: simpulseid:hash
    range: string

  gxParticipant:
    description: >
      Nested Gaia-X participant compliance data
      (gx:LegalPerson or gx:Participant blank node).
      Mirrors harbour:gxParticipant for the composition pattern.
    slot_uri: harbour:gxParticipant
    range: Any
    required: false

# ==========================================
# Enums
# ==========================================

enums:
  SimpulseIdLegalForm:
    permissible_values:
      LLC: {}
      Corporation: {}
      LimitedPartnership: {}
      NonprofitCorporation: {}
      GmbH: {}
      AG: {}
      Einzelunternehmen: {}
      GbR: {}
      OHG: {}
      KG: {}
      UG: {}
      SoleTrader: {}
      UnincorporatedAssociation: {}
      Partnership: {}
      Trust: {}
      LimitedCompany: {}
      LLP: {}
      CIC: {}
      CIO: {}
      CooperativeSociety: {}
      BenCom: {}
      other: {}

# ==========================================
# Classes
# ==========================================

classes:
  # ------------------------------------------
  # 1. NESTED TYPES (blank node / inlined)
  # ------------------------------------------

  TermsAndConditions:
    description: >
      Terms and conditions document reference with integrity hash.
    class_uri: simpulseid:TermsAndConditions
    slots: [url, hash]

  # ------------------------------------------
  # 2. SUBJECT TYPES
  # ------------------------------------------

  SimpulseidParticipant:
    description: >
      An organization participating in the SimpulseID ecosystem.
      References a Harbour Gaia-X credential via harbourCredential IRI
      for the baseline of trust.
    class_uri: simpulseid:Participant
    slots: [harbourCredential, legalForm, duns, email, url, termsAndConditions, gxParticipant]
    attributes:
      # W3C VC v2 context maps name → https://schema.org/name (@protected).
      # Harbour defines schema:name as http://. Use attribute with sdo:name
      # (HTTPS) so SHACL sh:path matches the actual RDF predicate.
      name:
        slot_uri: sdo:name
        range: string
        required: false

  SimpulseidAdministrator:
    description: >
      An administrator (natural person with elevated permissions) in the
      SimpulseID ecosystem.
    class_uri: simpulseid:Administrator
    slots: [harbourCredential, givenName, familyName, email, memberOf, gxParticipant]
    attributes:
      name:
        slot_uri: sdo:name
        range: string
    slot_usage:
      givenName: { required: true }
      familyName: { required: true }
      email: { required: true }

  SimpulseidUser:
    description: >
      A standard user (natural person) in the SimpulseID ecosystem.
    class_uri: simpulseid:User
    slots: [harbourCredential, givenName, familyName, email, memberOf, gxParticipant]
    attributes:
      name:
        slot_uri: sdo:name
        range: string

  AscsBaseMembership:
    description: >
      ASCS e.V. base membership subject.
    class_uri: simpulseid:AscsBaseMembership
    slots: [member, programName, hostingOrganization, memberSince]
    slot_usage:
      member: { required: true }

  AscsEnvitedMembership:
    description: >
      ASCS e.V. ENVITED membership subject (requires base membership).
    class_uri: simpulseid:AscsEnvitedMembership
    slots: [member, programName, hostingOrganization, memberSince, baseMembershipCredential]
    slot_usage:
      member: { required: true }
      baseMembershipCredential: { required: true }
