id: https://w3id.org/ascs-ev/simpulse-id/credentials/v1
name: simpulseid
description: >
  LinkML schema for SimpulseID credentials.
  Inherits Evidence and TermsAndConditions from Harbour/Gaia-X, constrains
  the W3C VC envelope, and enforces Gaia-X compliance plus ASCS-specific rules.

prefixes:
  linkml: https://w3id.org/linkml/
  simpulseid: https://w3id.org/ascs-ev/simpulse-id/credentials/v1/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  core: https://w3id.org/reachhaven/harbour/core/v1/
  cs: https://www.w3.org/ns/credentials/status#
  gx: https://w3id.org/gaia-x/development#
  schema: http://schema.org/
  cred: https://www.w3.org/2018/credentials#
  vcard: http://www.w3.org/2006/vcard/ns#
  xsd: http://www.w3.org/2001/XMLSchema#
  skos: http://www.w3.org/2004/02/skos/core#
  lf: https://w3id.org/ascs-ev/simpulse-id/legal-form/v1/

default_prefix: simpulseid
default_range: string

imports:
  - linkml:types
  - core
  - gaia-x
  - harbour

slots:
  # --- W3C VC v2 Envelope Slots ---
  # validFrom and validUntil are defined in harbour (our constraints on cred:)

  issuer:
    slot_uri: cred:issuer
    range: SimpulseIdIssuer
    required: true

  credentialSubject:
    slot_uri: cred:credentialSubject
    range: CredentialSubject
    required: true

  credentialStatus:
    slot_uri: cred:credentialStatus
    range: CRSetEntry
    multivalued: true
    required: false

  proof:
    slot_uri: cred:proof
    range: string
    required: false

  # --- SimpulseID Specific Business Slots ---

  duns:
    description: The Data Universal Numbering System (DUNS) number.
    slot_uri: simpulseid:duns
    range: string

  baseMembershipCredential:
    description: Reference to the base membership credential required for nested memberships.
    slot_uri: simpulseid:baseMembershipCredential
    range: uri

  member:
    description: The participant (organization or person) that holds this membership.
    slot_uri: schema:member
    range: uri

  # --- Schema.org Mappings (Natural Person & Memberships) ---

  givenName:
    slot_uri: schema:givenName
    range: string

  familyName:
    slot_uri: schema:familyName
    range: string

  memberOf:
    slot_uri: schema:memberOf
    multivalued: true
    range: uri

  programName:
    slot_uri: schema:programName
    range: string

  hostingOrganization:
    description: Reference to the organization hosting the membership program.
    slot_uri: schema:hostingOrganization
    range: uri

  memberSince:
    slot_uri: schema:memberSince
    range: date

  # --- SimpulseID Extensions ---

  legalForm:
    description: The legal form of the entity (e.g., AG, GmbH). Not defined in Gaia-X upstream.
    slot_uri: simpulseid:legalForm
    range: SimpulseIdLegalForm

  legalPerson:
    slot_uri: simpulseid:legalPerson
    range: LegalPerson
    inlined: true
    description: Gaia-X LegalPerson information for this participant.

enums:
  SimpulseIdLegalForm:
    permissible_values:
      LLC: { meaning: lf:LLC }
      Corporation: { meaning: lf:Corporation }
      LimitedPartnership: { meaning: lf:LimitedPartnership }
      NonprofitCorporation: { meaning: lf:NonprofitCorporation }
      GmbH: { meaning: lf:GmbH }
      AG: { meaning: lf:AG }
      Einzelunternehmen: { meaning: lf:Einzelunternehmen }
      GbR: { meaning: lf:GbR }
      OHG: { meaning: lf:OHG }
      KG: { meaning: lf:KG }
      UG: { meaning: lf:UG }
      SoleTrader: { meaning: lf:SoleTrader }
      UnincorporatedAssociation: { meaning: lf:UnincorporatedAssociation }
      Partnership: { meaning: lf:Partnership }
      Trust: { meaning: lf:Trust }
      LimitedCompany: { meaning: lf:LimitedCompany }
      LLP: { meaning: lf:LLP }
      CIC: { meaning: lf:CIC }
      CIO: { meaning: lf:CIO }
      CooperativeSociety: { meaning: lf:CooperativeSociety }
      BenCom: { meaning: lf:BenCom }
      other: { meaning: lf:other }

classes:
  SimpulseIdIssuer:
    is_a: Issuer
    class_uri: simpulseid:Issuer
    description: >
      SimpulseID issuer extends Gaia-X Issuer. The member slot identifies
      which participant this credential is issued for.
    slots:
      - member
    slot_usage:
      member: { required: true }

  SimpulseIdAddress:
    is_a: Address
    class_uri: gx:Address
    slots:
      - streetAddress
      - postalCode
      - locality
      - countryCode
      - region
    slot_usage:
      countryCode:
        required: true
      region:
        required: false

  CredentialSubject:
    abstract: true
    class_uri: schema:Thing
    slots: [id, type, termsAndConditions]
    slot_usage:
      termsAndConditions:
        range: TermsAndConditions
        multivalued: true

  NaturalPerson:
    class_uri: gx:NaturalPerson
    slots:
      - givenName
      - familyName
      - email
      - memberOf
      - address
    slot_usage:
      address: { range: SimpulseIdAddress, required: false }

  Administrator:
    is_a: NaturalPerson
    mixins: [CredentialSubject]
    class_uri: simpulseid:Administrator
    slot_usage:
      address: { required: true }
      givenName: { required: true }
      familyName: { required: true }
      email: { required: true }

  User:
    is_a: NaturalPerson
    mixins: [CredentialSubject]
    class_uri: simpulseid:User

  SimpulseidParticipant:
    mixins: [CredentialSubject]
    class_uri: simpulseid:Participant
    slots: [legalPerson, legalForm, email, url, duns, termsAndConditions]
    slot_usage:
      legalPerson:
        range: LegalPerson
        required: true

  AscsBaseMembership:
    is_a: CredentialSubject
    class_uri: simpulseid:AscsBaseMembership
    slots: [member, programName, hostingOrganization, memberSince]
    slot_usage:
      member: { required: true }

  AscsEnvitedMembership:
    is_a: CredentialSubject
    class_uri: simpulseid:AscsEnvitedMembership
    slots: [member, programName, hostingOrganization, memberSince, baseMembershipCredential]
    slot_usage:
      member: { required: true }
      baseMembershipCredential: { required: true }

  VerifiableCredential:
    abstract: true
    class_uri: cred:VerifiableCredential
    slots:
      - id
      - type
      - issuer
      - validFrom
      - validUntil
      - credentialSubject
      - credentialStatus
      - evidence
      - proof

  ParticipantCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:ParticipantCredential
    slot_usage:
      credentialSubject: { range: SimpulseidParticipant, required: true }
      evidence: { required: true }

  AscsBaseMembershipCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:AscsBaseMembershipCredential
    slot_usage:
      credentialSubject: { range: AscsBaseMembership, required: true }
      evidence: { required: true }

  AscsEnvitedMembershipCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:AscsEnvitedMembershipCredential
    slot_usage:
      credentialSubject: { range: AscsEnvitedMembership, required: true }
      evidence: { required: true }

  AdministratorCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:AdministratorCredential
    slot_usage:
      credentialSubject: { range: Administrator, required: true }

  UserCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:UserCredential
    slot_usage:
      credentialSubject: { range: User, required: true }
      evidence: { required: true }
