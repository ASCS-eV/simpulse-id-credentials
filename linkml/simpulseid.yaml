id: https://w3id.org/ascs-ev/simpulse-id/credentials/v1
name: simpulseid
description: >
  LinkML schema for SimpulseID credentials.
  Domain layer on top of Harbour credentials base. Defines ASCS-specific
  credential types and subject types extending HarbourCredential.
  Gaia-X compliance is delegated to the Harbour baseline credential,
  referenced via harbourCredential IRI.

prefixes:
  linkml: https://w3id.org/linkml/
  simpulseid: https://w3id.org/ascs-ev/simpulse-id/credentials/v1/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  harbour_gx: https://w3id.org/reachhaven/harbour/gaiax-domain/v1/
  sdo: https://schema.org/
  didcore: https://www.w3.org/ns/did#
  gx: https://w3id.org/gaia-x/development#
  cred: https://www.w3.org/2018/credentials#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: simpulseid
default_range: string

# NOTE: The generated JSON-LD context uses @vocab: simpulseid: which
# resolves bare @id values (e.g., "duns", "hash") to simpulseid:duns etc.
# This is correct per JSON-LD 1.1 §4.1.3 when this context is the last
# entry in the @context array, which is the standard usage pattern.

imports:
  - linkml:types
  - ./harbour
  - ./simpulseid-credentials

# ==========================================
# Slots
# ==========================================

slots:
  # --- SimpulseID Specific Business Slots ---

  duns:
    description: The Data Universal Numbering System (DUNS) number.
    slot_uri: simpulseid:duns
    range: string

  baseMembershipCredential:
    description: Reference to the base membership credential required for nested memberships.
    slot_uri: simpulseid:baseMembershipCredential
    range: uri

  member:
    description: >
      The participant (organization or person) that holds this membership.
      NOTE: schema.org defines member on Organization and ProgramMembership
      with range Organization|Person. Here the range is uri (a DID) which
      identifies the participant — semantically equivalent.
    slot_uri: sdo:member
    range: uri

  # --- Schema.org Mappings (Memberships) ---

  memberOf:
    slot_uri: sdo:memberOf
    multivalued: true
    range: uri

  programName:
    description: >
      Name of the membership program. NOTE: schema.org marks programName as
      superseded by the "program" property (linking to MemberProgram type).
      Retained here for simplicity — membership programs are identified by
      program DIDs, not full MemberProgram objects.
    slot_uri: sdo:programName
    range: string

  hostingOrganization:
    description: Reference to the organization hosting the membership program.
    slot_uri: sdo:hostingOrganization
    range: uri

  memberSince:
    description: >
      Date when the member joined the program. NOTE: schema.org lists
      memberSince in the "pending" section (not yet in the core vocabulary).
      Used here as a stable IRI for membership start dates.
    slot_uri: sdo:memberSince
    range: date

  # --- SimpulseID Extensions ---

  legalForm:
    description: The legal form of the entity (e.g., AG, GmbH).
    slot_uri: simpulseid:legalForm
    range: SimpulseIdLegalForm

  # --- Reference Slots ---

  harbourCredential:
    description: >
      IRI reference to the Harbour Gaia-X credential that serves as the
      baseline of trust for this SimpulseID credential.
    slot_uri: simpulseid:harbourCredential
    range: uri
    required: true

  # termsAndConditions — imported from gx (slot_uri: gx:termsAndConditions).
  # Range overridden to TermsAndConditions via slot_usage on SimpulseidParticipant.
  # gxParticipant — inherited from harbour-gx-credential (range: Participant).

# ==========================================
# Enums
# ==========================================

enums:
  SimpulseIdLegalForm:
    description: Legal form of a participating organization.
    permissible_values:
      LLC:
        description: Limited Liability Company (US)
      Corporation:
        description: Corporation (US)
      LimitedPartnership:
        description: Limited Partnership (US/UK)
      NonprofitCorporation:
        description: Nonprofit Corporation (US)
      GmbH:
        description: Gesellschaft mit beschränkter Haftung (DE)
      AG:
        description: Aktiengesellschaft (DE)
      Einzelunternehmen:
        description: Sole proprietorship (DE)
      GbR:
        description: Gesellschaft bürgerlichen Rechts (DE)
      OHG:
        description: Offene Handelsgesellschaft (DE)
      KG:
        description: Kommanditgesellschaft (DE)
      UG:
        description: Unternehmergesellschaft (haftungsbeschränkt) (DE)
      SoleTrader:
        description: Sole Trader (UK)
      UnincorporatedAssociation:
        description: Unincorporated Association (UK)
      Partnership:
        description: General Partnership (UK)
      Trust:
        description: Trust (UK)
      LimitedCompany:
        description: Limited Company (UK)
      LLP:
        description: Limited Liability Partnership (UK)
      CIC:
        description: Community Interest Company (UK)
      CIO:
        description: Charitable Incorporated Organisation (UK)
      CooperativeSociety:
        description: Co-operative Society (UK)
      BenCom:
        description: Community Benefit Society (UK)
      other:
        description: Other legal form not listed above

# ==========================================
# Classes
# ==========================================

classes:
  # ------------------------------------------
  # SUBJECT TYPES
  # ------------------------------------------

  SimpulseidParticipant:
    description: >
      An organization participating in the SimpulseID ecosystem.
      References a Harbour Gaia-X credential via harbourCredential IRI
      for the baseline of trust. The organization name lives inside the
      gxParticipant node as a gx:LegalPerson blank node.
    class_uri: simpulseid:Participant
    slots: [harbourCredential, legalForm, duns, email, url, termsAndConditions, gxParticipant]
    slot_usage:
      # Override slot_uri so SHACL sh:path matches the JSON-LD context
      # mapping (harbour-core defines email/url as schema:email/schema:url).
      # Without this, LinkML uses the gx-imported slot_uri (gx:email/gx:url)
      # which conflicts with the JSON-LD context.
      email:
        slot_uri: sdo:email
      url:
        slot_uri: sdo:url
      termsAndConditions:
        range: TermsAndConditions
        multivalued: true
        required: false

  SimpulseidAdministrator:
    description: >
      An administrator (natural person with elevated permissions) in the
      SimpulseID ecosystem. Personal attributes (givenName, familyName, email)
      live inside the gxParticipant node as a gx:NaturalPerson blank node.
    class_uri: simpulseid:Administrator
    slots: [harbourCredential, memberOf, gxParticipant]

  SimpulseidUser:
    description: >
      A standard user (natural person) in the SimpulseID ecosystem.
      Personal attributes (givenName, familyName, email) live inside the
      gxParticipant node as a gx:NaturalPerson blank node.
    class_uri: simpulseid:User
    slots: [harbourCredential, memberOf, gxParticipant]

  AscsBaseMembership:
    description: >
      ASCS e.V. base membership subject.
    class_uri: simpulseid:AscsBaseMembership
    slots: [member, programName, hostingOrganization, memberSince]
    slot_usage:
      member: { required: true }

  AscsEnvitedMembership:
    description: >
      ASCS e.V. ENVITED membership subject (requires base membership).
    class_uri: simpulseid:AscsEnvitedMembership
    slots: [member, programName, hostingOrganization, memberSince, baseMembershipCredential]
    slot_usage:
      member: { required: true }
      baseMembershipCredential: { required: true }
