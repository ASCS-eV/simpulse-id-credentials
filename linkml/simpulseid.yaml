id: https://schema.ascs.digital/SimpulseId/linkml/v1#SimpulseId
name: simpulseid
description: >
  LinkML schema for SimpulseID credentials.
  Inherits Evidence structure from Harbour and enforces specific business rules.

prefixes:
  linkml: https://w3id.org/linkml/
  simpulseid: https://schema.ascs.digital/SimpulseId/v1/credentials#
  harbour: https://schema.reachhaven.com/Harbour/v1/credentials#
  vcs: https://www.w3.org/ns/credentials/status#
  gx: https://w3id.org/gaia-x/development# # Harmonized with import
  schema: http://schema.org/
  vc: https://www.w3.org/ns/credentials/v2#
  vcard: http://www.w3.org/2006/vcard/ns#
  xsd: http://www.w3.org/2001/XMLSchema#
  skos: http://www.w3.org/2004/02/skos/core#
  lf: https://schema.ascs.digital/SimpulseId/v1/legalForm#

default_prefix: simpulseid
default_range: string

imports:
  - linkml:types
  - ./core
  - ../service-characteristics/linkml/gaia-x
  - ./harbour

slots:
  issuer:
    slot_uri: vc:issuer
    range: SimpulseIdIssuer
    required: true
    aliases: [issuer]

  issuance_date:
    slot_uri: vc:issuanceDate
    range: datetime
    required: true
    aliases: [issuanceDate]

  expiration_date:
    slot_uri: vc:expirationDate
    range: datetime
    required: false
    aliases: [expirationDate]

  credential_subject:
    slot_uri: vc:credentialSubject
    range: CredentialSubject
    required: true
    aliases: [credentialSubject]

  credential_status:
    slot_uri: vc:credentialStatus
    range: CRSetEntry
    multivalued: true
    required: false
    aliases: [credentialStatus]

  proof:
    slot_uri: vc:proof
    range: string
    required: false
    aliases: [proof]

  given_name:
    slot_uri: schema:givenName
    range: string
    aliases: [givenName]

  family_name:
    slot_uri: schema:familyName
    range: string
    aliases: [familyName]

  simpulse_email: # Renamed to avoid Gaia-X conflict
    slot_uri: schema:email
    range: string
    aliases: [email]

  simpulse_website: # Renamed to avoid Gaia-X conflict
    slot_uri: schema:url
    range: uri
    aliases: [website]

  duns:
    slot_uri: simpulseid:duns
    range: string
    aliases: [duns]

  censored:
    slot_uri: simpulseid:censored
    range: boolean
    required: false
    aliases: [censored]

  member_of:
    slot_uri: schema:memberOf
    multivalued: true
    range: uri
    aliases: [memberOf]

  program_name:
    slot_uri: schema:programName
    range: string
    aliases: [programName]

  hosting_organization:
    slot_uri: schema:hostingOrganization
    range: SimpulseIdHostingOrganization
    aliases: [hostingOrganization]

  member_since:
    slot_uri: schema:memberSince
    range: date
    aliases: [memberSince]

  street_address:
    slot_uri: vcard:street-address
    range: string
    aliases: [streetAddress]

  postal_code:
    slot_uri: vcard:postal-code
    range: string
    aliases: [postalCode]

  locality:
    slot_uri: vcard:locality
    range: string
    aliases: [locality]

  base_membership_credential:
    slot_uri: simpulseid:baseMembershipCredential
    range: uri
    aliases: [baseMembershipCredential]

enums:
  SimpulseIdLegalForm:
    permissible_values:
      LLC: { meaning: lf:LLC }
      Corporation: { meaning: lf:Corporation }
      LimitedPartnership: { meaning: lf:LimitedPartnership }
      NonprofitCorporation: { meaning: lf:NonprofitCorporation }
      GmbH: { meaning: lf:GmbH }
      AG: { meaning: lf:AG }
      Einzelunternehmen: { meaning: lf:Einzelunternehmen }
      GbR: { meaning: lf:GbR }
      OHG: { meaning: lf:OHG }
      KG: { meaning: lf:KG }
      UG: { meaning: lf:UG }
      SoleTrader: { meaning: lf:SoleTrader }
      UnincorporatedAssociation: { meaning: lf:UnincorporatedAssociation }
      Partnership: { meaning: lf:Partnership }
      Trust: { meaning: lf:Trust }
      LimitedCompany: { meaning: lf:LimitedCompany }
      LLP: { meaning: lf:LLP }
      CIC: { meaning: lf:CIC }
      CIO: { meaning: lf:CIO }
      CooperativeSociety: { meaning: lf:CooperativeSociety }
      BenCom: { meaning: lf:BenCom }
      other: { meaning: lf:other }

classes:
  SimpulseIdIssuer:
    is_a: Issuer
    class_uri: simpulseid:Issuer

  SimpulseIdAddress:
    is_a: Address
    class_uri: gx:Address
    slots:
      - street_address
      - postal_code
      - locality
      - country_code
      - region
    slot_usage:
      country_code: { required: true, aliases: [countryCode] }
      region: { required: false, aliases: [region] }

  CredentialSubject:
    abstract: true
    class_uri: schema:Thing
    slots: [id, type, terms_and_conditions]
    slot_usage:
      terms_and_conditions: { range: LegalDocument, multivalued: true, aliases: [termsAndConditions] }

  NaturalPerson:
    class_uri: gx:NaturalPerson
    slots: [given_name, family_name, simpulse_email, member_of, address]
    slot_usage:
      address: { range: SimpulseIdAddress, required: false, aliases: [address] }

  Administrator:
    is_a: NaturalPerson
    mixins: [CredentialSubject]
    class_uri: simpulseid:Administrator
    slot_usage:
      address: { required: true }
      given_name: { required: true }
      family_name: { required: true }
      simpulse_email: { required: true }

  User:
    is_a: NaturalPerson
    mixins: [CredentialSubject]
    class_uri: simpulseid:User
    slots: [censored]

  SimpulseIdHostingOrganization:
    is_a: LegalPerson
    class_uri: gx:LegalPerson
    slots: [legal_name]
    slot_usage:
      legal_name: { aliases: [legalName] }
      legal_address: { required: false, aliases: [legalAddress] }
      headquarters_address: { required: false, aliases: [headquartersAddress] }

  SimpulseidParticipant:
    is_a: LegalPerson
    mixins: [CredentialSubject]
    class_uri: simpulseid:Participant
    slots: [legal_name, legal_form, legal_address, headquarters_address, simpulse_email, simpulse_website, duns, terms_and_conditions]
    slot_usage:
      legal_name: { aliases: [legalName] }
      legal_form: { range: SimpulseIdLegalForm, aliases: [legalForm] }
      legal_address: { range: SimpulseIdAddress, required: true, aliases: [legalAddress] }
      headquarters_address: { range: SimpulseIdAddress, aliases: [headquartersAddress] }
      simpulse_website: { aliases: [website] }
      duns: { aliases: [duns] }

  AscsBaseMembership:
    is_a: CredentialSubject
    class_uri: simpulseid:AscsBaseMembership
    slots: [program_name, hosting_organization, member_of, member_since]

  AscsEnvitedMembership:
    is_a: CredentialSubject
    class_uri: simpulseid:AscsEnvitedMembership
    slots: [program_name, hosting_organization, member_of, member_since, base_membership_credential]

  VerifiableCredential:
    class_uri: vc:VerifiableCredential
    slots: [id, type, issuer, issuance_date, expiration_date, credential_subject, credential_status, evidence, proof]

  ParticipantCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:ParticipantCredential
    slot_usage:
      credential_subject: { range: SimpulseidParticipant, required: true }
      evidence: { required: true }

  AscsBaseMembershipCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:AscsBaseMembershipCredential
    slot_usage:
      credential_subject: { range: AscsBaseMembership, required: true }
      evidence: { required: true }

  AscsEnvitedMembershipCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:AscsEnvitedMembershipCredential
    slot_usage:
      credential_subject: { range: AscsEnvitedMembership, required: true }
      evidence: { required: true }

  AdministratorCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:AdministratorCredential
    slot_usage:
      credential_subject: { range: Administrator, required: true }

  UserCredential:
    is_a: VerifiableCredential
    class_uri: simpulseid:UserCredential
    slot_usage:
      credential_subject: { range: User, required: true }
      evidence: { required: true }
