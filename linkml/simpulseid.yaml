id: https://w3id.org/ascs-ev/simpulse-id/credentials/v1
name: simpulseid
description: >
  LinkML schema for SimpulseID credentials.
  Domain layer on top of Harbour credentials base. Defines ASCS-specific
  credential types and subject types extending HarbourCredential.
  Gaia-X compliance data is carried via composition (gxParticipant).

prefixes:
  linkml: https://w3id.org/linkml/
  simpulseid: https://w3id.org/ascs-ev/simpulse-id/credentials/v1/
  harbour: https://w3id.org/reachhaven/harbour/credentials/v1/
  schema: http://schema.org/
  cred: https://www.w3.org/2018/credentials#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: simpulseid
default_range: string

imports:
  - linkml:types
  - ./harbour

# ==========================================
# Slots
# ==========================================

slots:
  # --- SimpulseID Specific Business Slots ---

  duns:
    description: The Data Universal Numbering System (DUNS) number.
    slot_uri: simpulseid:duns
    range: string

  baseMembershipCredential:
    description: Reference to the base membership credential required for nested memberships.
    slot_uri: simpulseid:baseMembershipCredential
    range: uri

  member:
    description: The participant (organization or person) that holds this membership.
    slot_uri: schema:member
    range: uri

  # --- Schema.org Mappings (Natural Person & Memberships) ---

  givenName:
    slot_uri: schema:givenName
    range: string

  familyName:
    slot_uri: schema:familyName
    range: string

  memberOf:
    slot_uri: schema:memberOf
    multivalued: true
    range: uri

  programName:
    slot_uri: schema:programName
    range: string

  hostingOrganization:
    description: Reference to the organization hosting the membership program.
    slot_uri: schema:hostingOrganization
    range: uri

  memberSince:
    slot_uri: schema:memberSince
    range: date

  # --- SimpulseID Extensions ---

  legalForm:
    description: The legal form of the entity (e.g., AG, GmbH).
    slot_uri: simpulseid:legalForm
    range: SimpulseIdLegalForm

  # --- Composition Slots ---

  gxParticipant:
    description: >
      Nested Gaia-X participant compliance data (opaque blank node).
      When Gaia-X compliance is needed, the gx data (legalAddress,
      headquartersAddress, registrationNumber, etc.) goes inside this node.
    slot_uri: harbour:gxParticipant
    range: Any
    required: false

  termsAndConditions:
    description: Terms and conditions accepted by the credential subject.
    slot_uri: simpulseid:termsAndConditions
    range: Any
    multivalued: true
    required: false

# ==========================================
# Enums
# ==========================================

enums:
  SimpulseIdLegalForm:
    permissible_values:
      LLC: {}
      Corporation: {}
      LimitedPartnership: {}
      NonprofitCorporation: {}
      GmbH: {}
      AG: {}
      Einzelunternehmen: {}
      GbR: {}
      OHG: {}
      KG: {}
      UG: {}
      SoleTrader: {}
      UnincorporatedAssociation: {}
      Partnership: {}
      Trust: {}
      LimitedCompany: {}
      LLP: {}
      CIC: {}
      CIO: {}
      CooperativeSociety: {}
      BenCom: {}
      other: {}

# ==========================================
# Classes
# ==========================================

classes:
  # ------------------------------------------
  # 1. CREDENTIAL TYPES (extend HarbourCredential)
  # ------------------------------------------

  ParticipantCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a simpulseid:Participant (organization) identity.
    class_uri: simpulseid:ParticipantCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  AdministratorCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a simpulseid:Administrator (person with elevated permissions).
    class_uri: simpulseid:AdministratorCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  UserCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to a simpulseid:User (natural person).
    class_uri: simpulseid:UserCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  AscsBaseMembershipCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to ASCS e.V. base membership.
    class_uri: simpulseid:AscsBaseMembershipCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  AscsEnvitedMembershipCredential:
    is_a: HarbourCredential
    description: >
      Credential attesting to ASCS e.V. ENVITED membership.
    class_uri: simpulseid:AscsEnvitedMembershipCredential
    attributes:
      credentialStatus:
        slot_uri: cred:credentialStatus
        range: CRSetEntry
        multivalued: true
        required: false
    slot_usage:
      evidence: { required: false }

  # ------------------------------------------
  # 2. SUBJECT TYPES
  # ------------------------------------------

  SimpulseidParticipant:
    description: >
      An organization participating in the SimpulseID ecosystem.
      In skeleton form only harbour properties are present. When Gaia-X
      compliance is needed, gxParticipant carries the gx blank node.
    class_uri: simpulseid:Participant
    slots: [name, gxParticipant, legalForm, duns, email, url, termsAndConditions]
    slot_usage:
      name: { required: false }
      gxParticipant: { required: false }

  SimpulseidAdministrator:
    description: >
      An administrator (natural person with elevated permissions) in the
      SimpulseID ecosystem.
    class_uri: simpulseid:Administrator
    slots: [name, givenName, familyName, email, memberOf]
    slot_usage:
      givenName: { required: true }
      familyName: { required: true }
      email: { required: true }

  SimpulseidUser:
    description: >
      A standard user (natural person) in the SimpulseID ecosystem.
    class_uri: simpulseid:User
    slots: [name, givenName, familyName, email, memberOf]

  AscsBaseMembership:
    description: >
      ASCS e.V. base membership subject.
    class_uri: simpulseid:AscsBaseMembership
    slots: [member, programName, hostingOrganization, memberSince]
    slot_usage:
      member: { required: true }

  AscsEnvitedMembership:
    description: >
      ASCS e.V. ENVITED membership subject (requires base membership).
    class_uri: simpulseid:AscsEnvitedMembership
    slots: [member, programName, hostingOrganization, memberSince, baseMembershipCredential]
    slot_usage:
      member: { required: true }
      baseMembershipCredential: { required: true }
